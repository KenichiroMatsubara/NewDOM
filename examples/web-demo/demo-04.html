<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hayate — Lv.4 Element Layer Flex レイアウト</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: ui-monospace, 'Cascadia Code', Menlo, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
    }

    .back-link {
      display: inline-block;
      align-self: flex-start;
      margin-bottom: 14px;
      font-size: .68rem;
      color: #64748b;
      text-decoration: none;
      letter-spacing: .04em;
      padding: 4px 10px;
      border: 1px solid #334155;
      border-radius: 999px;
    }
    .back-link:hover { color: #94a3b8; border-color: #475569; }

    .lv-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: .6rem;
      font-weight: 900;
      letter-spacing: .08em;
      color: #fff;
      margin-bottom: 6px;
    }

    header { text-align: center; margin-bottom: 20px; }
    header h1 { font-size: 1rem; font-weight: 900; color: #f8fafc; letter-spacing: -.02em; }
    header p  { font-size: .7rem; color: #475569; margin-top: 4px; }

    .pipeline {
      display: flex; align-items: center; gap: 4px;
      margin-bottom: 20px; flex-wrap: wrap; justify-content: center;
    }
    .step {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 999px;
      border: 1px solid #334155; background: #1e293b;
      font-size: .65rem; font-weight: 700; color: #64748b;
      white-space: nowrap; transition: all .2s;
    }
    .step .dot { width: 7px; height: 7px; border-radius: 50%; background: #334155; flex-shrink: 0; }
    .step.ok   { color: #4ade80; border-color: #166534; background: #052e16; }
    .step.ok .dot   { background: #4ade80; }
    .step.run  { color: #818cf8; border-color: #3730a3; background: #1e1b4b; animation: pulse .9s ease-in-out infinite; }
    .step.run .dot  { background: #818cf8; }
    .step.fail { color: #f87171; border-color: #7f1d1d; background: #2d0a0a; }
    .step.fail .dot { background: #f87171; }
    .step.warn { color: #fbbf24; border-color: #78350f; background: #1c1002; }
    .step.warn .dot { background: #fbbf24; }
    @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

    .canvas-wrap {
      position: relative; border: 2px solid #334155;
      border-radius: 10px; overflow: hidden; background: #020617;
    }
    canvas { display: block; }
    #canvas-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; background: #020617ee;
      font-size: .85rem; color: #64748b; text-align: center;
      padding: 24px; transition: opacity .3s;
    }
    #canvas-overlay.gone { opacity: 0; pointer-events: none; }
    #overlay-icon { font-size: 2rem; }
    #overlay-msg  { font-weight: 700; }
    #overlay-sub  { font-size: .7rem; color: #475569; max-width: 380px; line-height: 1.6; }

    .panel {
      margin-top: 20px; width: 100%; max-width: 720px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .section { border: 1px solid #1e293b; border-radius: 12px; overflow: hidden; }
    .section-title {
      padding: 8px 14px; font-size: .65rem; font-weight: 900;
      text-transform: uppercase; letter-spacing: .1em;
      color: #475569; background: #1e293b44;
    }
    .section-body { padding: 14px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
    .row:last-child { margin-bottom: 0; }
    .field { display: flex; flex-direction: column; gap: 3px; font-size: .65rem; color: #64748b; }
    .field label { font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
    .field select, .field input {
      padding: 4px 6px; background: #0f172a;
      border: 1px solid #334155; border-radius: 6px;
      color: #e2e8f0; font-family: inherit; font-size: .7rem;
    }
    .field input[type=range] { width: 160px; }
    button {
      padding: 6px 14px; border: 1px solid #334155; border-radius: 6px;
      background: #1e293b; color: #e2e8f0;
      font-family: inherit; font-size: .72rem; font-weight: 700; cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    button:hover:not(:disabled) { background: #334155; border-color: #475569; }
    button:disabled { opacity: .35; cursor: not-allowed; }
    button.primary { background: #1d4ed8; border-color: #2563eb; color: #fff; }
    button.primary:hover:not(:disabled) { background: #2563eb; }

    .feature-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 6px 0; font-size: .68rem; color: #94a3b8;
      border-bottom: 1px solid #1e293b;
    }
    .feature-row:last-child { border-bottom: none; }
    .feat-icon { font-size: .85rem; flex-shrink: 0; line-height: 1.3; }
    .feat-name { flex: 1; font-family: ui-monospace, monospace; }
    .feat-err  { color: #f87171; font-size: .6rem; flex: 2; word-break: break-all; opacity: .85; }
    .feat-pending { font-size: .62rem; color: #475569; font-style: italic; }
  </style>
</head>
<body>

  <a href="./index.html" class="back-link">← 一覧に戻る</a>

  <header>
    <div class="lv-badge" style="background:#dc2626">Lv.4</div>
    <h1>Element Layer — Flex レイアウト</h1>
    <p>flex-direction / align-items / justify-content / gap を操作して Taffy レイアウトの動作を確認</p>
  </header>

  <div class="pipeline" id="pipeline">
    <div class="step" id="s1"><span class="dot"></span>WebGPU 検出</div>
    <div class="step" id="s2"><span class="dot"></span>WASM ロード</div>
    <div class="step" id="s3"><span class="dot"></span><span id="s3-label">Renderer 初期化</span></div>
    <div class="step" id="s4"><span class="dot"></span>初期描画</div>
  </div>

  <div class="canvas-wrap">
    <canvas id="canvas" width="640" height="360"></canvas>
    <div id="html-surface" style="display:none; width:640px; height:360px; position:relative; overflow:hidden;"></div>
    <div id="canvas-overlay">
      <div id="overlay-icon">⏳</div>
      <div id="overlay-msg">初期化中...</div>
      <div id="overlay-sub"></div>
    </div>
  </div>

  <div class="panel">

    <div class="section">
      <div class="section-title">Flex レイアウト · element_set_style(DISPLAY / FLEX_DIRECTION / ALIGN / GAP)</div>
      <div class="section-body">
        <div class="row">
          <div class="field">
            <label>flex-direction</label>
            <select id="flexDir">
              <option value="0">row</option>
              <option value="1">column</option>
              <option value="2">row-reverse</option>
              <option value="3">column-reverse</option>
            </select>
          </div>
          <div class="field">
            <label>align-items</label>
            <select id="alignItems">
              <option value="0">start</option>
              <option value="1">end</option>
              <option value="2" selected>center</option>
              <option value="3">stretch</option>
            </select>
          </div>
          <div class="field">
            <label>justify-content</label>
            <select id="justifyContent">
              <option value="0">start</option>
              <option value="1">end</option>
              <option value="2" selected>center</option>
              <option value="3">space-between</option>
              <option value="4">space-around</option>
              <option value="5">space-evenly</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>gap (px): <span id="gapVal">16</span></label>
            <input type="range" id="gap" min="0" max="80" value="16" />
          </div>
          <button class="primary" id="applyBtn" disabled>スタイルを適用</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">機能テスト結果 — API が例外を投げないことを確認</div>
      <div class="section-body">
        <div id="featureResults"><span class="feat-pending">初期化後に自動実行...</span></div>
      </div>
    </div>
  </div>

  <script type="module">
    const TAG = {
      BACKGROUND_COLOR: 0, BORDER_RADIUS: 2,
      WIDTH: 5, HEIGHT: 6,
      DISPLAY: 11, FLEX_DIRECTION: 12, ALIGN_ITEMS: 13, JUSTIFY_CONTENT: 14,
      GAP: 15, PADDING: 16,
    };
    const UNIT    = { PX: 0 };
    const DISPLAY = { FLEX: 0 };

    function packStyle(props) {
      const out = [];
      for (const p of props) out.push(p.tag, ...p.payload);
      return new Float32Array(out);
    }
    function hexToRgb01(hex) {
      return [parseInt(hex.slice(1,3),16)/255, parseInt(hex.slice(3,5),16)/255, parseInt(hex.slice(5,7),16)/255];
    }

    const $ = id => document.getElementById(id);
    function step(id, state) { $(id).className = `step ${state}`; }
    function overlay(icon, msg, sub = '') {
      $('overlay-icon').textContent = icon;
      $('overlay-msg').textContent  = msg;
      $('overlay-sub').textContent  = sub;
    }
    function overlayGone() { $('canvas-overlay').classList.add('gone'); }

    // ── 1. WebGPU 検出 ─────────────────────────────────────────────────────
    step('s1', 'run');
    overlay('🔍', 'WebGPU を検出中...');
    let webgpuOk = false;
    try {
      if (navigator.gpu) {
        const adapter = await navigator.gpu.requestAdapter();
        webgpuOk = !!adapter;
      }
    } catch { webgpuOk = false; }
    step('s1', webgpuOk ? 'ok' : 'warn');

    // ── 2. WASM ロード ─────────────────────────────────────────────────────
    step('s2', 'run');
    overlay('📦', 'WASM モジュールを読み込み中...');
    let mod;
    try {
      mod = await import('./pkg/hayate_adapter_web.js');
      await mod.default();
      step('s2', 'ok');
    } catch(e) {
      step('s2', 'fail'); step('s3', 'fail'); step('s4', 'fail');
      overlay('❌', 'WASM ロード失敗', String(e)); throw e;
    }

    let renderer = null;
    let rootEl = null;
    const boxes = [];

    function render() {
      if (!renderer) return;
      try {
        renderer.set_background_color(0.04, 0.06, 0.1);
        renderer.render(performance.now());
      } catch(e) { console.error('[hayate] render:', e); }
    }

    function buildScene() {
      rootEl = renderer.element_create(mod.element_kind_view());
      renderer.set_root(rootEl);
      renderer.element_set_style(rootEl, packStyle([
        { tag: TAG.WIDTH,           payload: [640, UNIT.PX] },
        { tag: TAG.HEIGHT,          payload: [360, UNIT.PX] },
        { tag: TAG.DISPLAY,         payload: [DISPLAY.FLEX] },
        { tag: TAG.FLEX_DIRECTION,  payload: [0] },   // row
        { tag: TAG.ALIGN_ITEMS,     payload: [2] },   // center
        { tag: TAG.JUSTIFY_CONTENT, payload: [2] },   // center
        { tag: TAG.GAP,             payload: [16, UNIT.PX] },
        { tag: TAG.PADDING,         payload: [24, UNIT.PX] },
        { tag: TAG.BACKGROUND_COLOR,payload: [0.06, 0.09, 0.16, 1.0] },
      ]));

      const colors = [
        [0.23, 0.51, 0.96, 1.0],   // 青
        [0.96, 0.62, 0.04, 1.0],   // 橙
        [0.06, 0.73, 0.51, 1.0],   // 緑
      ];
      for (const [r,g,b,a] of colors) {
        const box = renderer.element_create(mod.element_kind_view());
        renderer.element_set_style(box, packStyle([
          { tag: TAG.WIDTH,             payload: [150, UNIT.PX] },
          { tag: TAG.HEIGHT,            payload: [150, UNIT.PX] },
          { tag: TAG.BORDER_RADIUS,     payload: [16] },
          { tag: TAG.BACKGROUND_COLOR,  payload: [r, g, b, a] },
        ]));
        renderer.element_append_child(rootEl, box);
        boxes.push(box);
      }
    }

    async function initRenderer() {
      step('s3', 'run');
      try {
        if (webgpuOk) {
          $('s3-label').textContent = 'Element Layer (Canvas)';
          overlay('⚙️', 'Element Layer (Canvas Mode) を初期化中...');
          $('canvas').style.display = 'block';
          $('html-surface').style.display = 'none';
          renderer = await mod.HayateElementRenderer.init($('canvas'));
        } else {
          $('s3-label').textContent = 'Element Layer (HTML)';
          overlay('🌐', 'Element Layer (HTML Mode) を初期化中...');
          $('canvas').style.display = 'none';
          $('html-surface').style.display = 'block';
          renderer = mod.HayateElementHtmlRenderer.new($('html-surface'));
        }
        step('s3', 'ok');
      } catch(e) {
        step('s3', 'fail'); step('s4', 'fail');
        overlay('❌', 'Renderer 初期化失敗', String(e)); throw e;
      }
      step('s4', 'run');
      overlay('🎨', '初期シーンを構築中...');
      try {
        buildScene();
        render();
        step('s4', 'ok');
        overlayGone();
      } catch(e) {
        step('s4', 'fail');
        overlay('❌', '初期描画失敗', String(e)); throw e;
      }
    }

    await initRenderer();

    // ── 機能テスト ─────────────────────────────────────────────────────────
    const results = $('featureResults');
    results.innerHTML = '';

    function test(label, fn) {
      const row = document.createElement('div');
      row.className = 'feature-row';
      try {
        fn();
        row.innerHTML = `<span class="feat-icon">✅</span><span class="feat-name">${label}</span>`;
      } catch(e) {
        row.innerHTML = `<span class="feat-icon">❌</span><span class="feat-name">${label}</span><span class="feat-err">${String(e).slice(0,140)}</span>`;
      }
      results.appendChild(row);
    }

    test('element_create(kind_view)', () => {
      const id = renderer.element_create(mod.element_kind_view());
      renderer.element_remove(id);
    });
    test('element_append_child(parent, child)', () => {
      const p = renderer.element_create(mod.element_kind_view());
      const c = renderer.element_create(mod.element_kind_view());
      renderer.element_append_child(p, c);
      renderer.element_remove(c);
      renderer.element_remove(p);
    });
    test('element_set_style(DISPLAY.FLEX)', () => {
      const id = renderer.element_create(mod.element_kind_view());
      renderer.element_set_style(id, packStyle([{ tag: TAG.DISPLAY, payload: [0] }]));
      renderer.element_remove(id);
    });
    test('element_set_style(FLEX_DIRECTION)', () => {
      const id = renderer.element_create(mod.element_kind_view());
      renderer.element_set_style(id, packStyle([{ tag: TAG.FLEX_DIRECTION, payload: [1] }]));
      renderer.element_remove(id);
    });
    test('element_set_style(ALIGN_ITEMS)', () => {
      const id = renderer.element_create(mod.element_kind_view());
      renderer.element_set_style(id, packStyle([{ tag: TAG.ALIGN_ITEMS, payload: [2] }]));
      renderer.element_remove(id);
    });
    test('element_set_style(JUSTIFY_CONTENT)', () => {
      const id = renderer.element_create(mod.element_kind_view());
      renderer.element_set_style(id, packStyle([{ tag: TAG.JUSTIFY_CONTENT, payload: [3] }]));
      renderer.element_remove(id);
    });
    test('element_set_style(GAP)', () => {
      const id = renderer.element_create(mod.element_kind_view());
      renderer.element_set_style(id, packStyle([{ tag: TAG.GAP, payload: [20, UNIT.PX] }]));
      renderer.element_remove(id);
    });
    test('render() — Flex コンテナシーン', () => { render(); });

    // ── コントロール配線 ───────────────────────────────────────────────────
    $('gap').addEventListener('input', () => { $('gapVal').textContent = $('gap').value; });

    $('applyBtn').disabled = false;
    $('applyBtn').addEventListener('click', () => {
      if (!rootEl) return;
      renderer.element_set_style(rootEl, packStyle([
        { tag: TAG.FLEX_DIRECTION,  payload: [Number($('flexDir').value)] },
        { tag: TAG.ALIGN_ITEMS,     payload: [Number($('alignItems').value)] },
        { tag: TAG.JUSTIFY_CONTENT, payload: [Number($('justifyContent').value)] },
        { tag: TAG.GAP,             payload: [Number($('gap').value), UNIT.PX] },
      ]));
      render();
    });
  </script>
</body>
</html>
