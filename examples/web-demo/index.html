<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NewDOM — web-demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #eee;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 24px;
    }
    h1 { font-size: 1.2rem; }
    canvas {
      border: 2px solid #444;
      border-radius: 4px;
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    input[type=color] {
      width: 48px;
      height: 32px;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
    button {
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #222;
      color: #eee;
      cursor: pointer;
    }
    button:hover { background: #333; }
    #status {
      font-size: 0.85rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>NewDOM Phase 0 — wgpu + Vello canvas clear</h1>

  <canvas id="canvas" width="640" height="480"></canvas>

  <div class="controls">
    <label>
      色を選ぶ:
      <input type="color" id="colorPicker" value="#3a86ff" />
    </label>
    <button id="clearBtn" disabled>nd_clear()</button>
  </div>

  <p id="status">WebGPU 初期化中…</p>

  <script type="module">
    import init, { NdRenderer } from './pkg/newdom_wasm.js';

    async function main() {
      await init();

      const canvas = document.getElementById('canvas');
      const status = document.getElementById('status');
      const btn    = document.getElementById('clearBtn');
      const picker = document.getElementById('colorPicker');

      let renderer;
      try {
        renderer = await NdRenderer.init(canvas);
        status.textContent = 'WebGPU + Vello 初期化完了';
        btn.disabled = false;
      } catch (err) {
        status.textContent = `初期化失敗: ${err}`;
        console.error(err);
        return;
      }

      function hexToRgb(hex) {
        const r = parseInt(hex.slice(1, 3), 16) / 255;
        const g = parseInt(hex.slice(3, 5), 16) / 255;
        const b = parseInt(hex.slice(5, 7), 16) / 255;
        return { r, g, b };
      }

      btn.addEventListener('click', () => {
        const { r, g, b } = hexToRgb(picker.value);
        try {
          renderer.nd_clear(r, g, b);
          status.textContent = `nd_clear(${r.toFixed(2)}, ${g.toFixed(2)}, ${b.toFixed(2)}) — OK`;
        } catch (err) {
          status.textContent = `エラー: ${err}`;
          console.error(err);
        }
      });

      // 初期描画
      const { r, g, b } = hexToRgb(picker.value);
      try {
        renderer.nd_clear(r, g, b);
        status.textContent = 'WebGPU + Vello 初期化完了 — キャンバス描画済み';
      } catch (err) {
        status.textContent = `初期描画失敗: ${err}`;
        console.error(err);
      }
    }

    main();
  </script>
</body>
</html>
